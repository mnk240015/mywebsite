<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>kさんのツイート</title>
</head>
<body>
    <h1>さんのツイート</h1>
    <p><a href="team-a.html">← aチームへ戻る</a></p>
    
<div id="tweet-list">タイムラインを読み込み中...</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // ステップ1で自動生成されたデータファイルのURL
    const dataUrl = './data/ksan.json'; 

    fetch(dataUrl)
        .then(response => {
            if (!response.ok) throw new Error('データが存在しません');
            return response.json();
        })
        .then(tweets => {
            let html = '<ul style="list-style:none; padding:0; max-height:500px; overflow-y:auto; border:1px solid #eee; padding:10px; border-radius:6px;">';
            
            // 最大20件を表示
            tweets.slice(0, 20).forEach(tweet => {
                html += `
                    <li style="margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid #f5f5f5;">
                        <small style="color:#888;">${tweet.date}</small>
                        <div style="margin-top:4px;">${tweet.text}</div>
                    </li>
                `;
            });
            html += '</ul>';
            document.getElementById('tweet-list').innerHTML = html;
        })
        .catch(err => {
            document.getElementById('tweet-list').innerHTML = '現在タイムラインを表示できません。';
        });
});
</script>

</body>
</html>

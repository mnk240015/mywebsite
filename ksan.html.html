<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>k-san Timeline</title>
    <style>
        /* 画面の中央に読みやすい幅で表示します */
        .timeline-wrapper {
            max-width: 500px;
            margin: 20px auto;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <div class="timeline-wrapper">
        <!-- 💡 以下の「k_san_xyz」の部分を、実際のXのユーザー名（@の後ろの英数字）に書き換えてください -->
        <a class="twitter-timeline" 
           href="https://twitter.com/k_san_xyz?ref_src=twsrc%5Etfw"
           data-height="600">
           タイムラインを読み込み中...
        </a>
    </div>

    <!-- X公式の表示システムを読み込みます（これがないとただのリンクになります） -->
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

</body>
</html>

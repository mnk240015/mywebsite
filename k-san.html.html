<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k-san Timeline</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f7f9f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .timeline-container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 20px;
        }
        h1 {
            font-size: 18px;
            color: #0f1419;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid #f2f2f2;
            padding-bottom: 10px;
        }
        #tweet-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 500px;
            overflow-y: auto;
        }
        .tweet-item {
            padding: 12px 0;
            border-bottom: 1px solid #eff3f4;
        }
        .tweet-item:last-child {
            border-bottom: none;
        }
        .tweet-date {
            font-size: 12px;
            color: #536471;
        }
        .tweet-text {
            font-size: 14px;
            color: #0f1419;
            margin-top: 4px;
            line-height: 1.4;
            white-space: pre-wrap;
        }
        .error-msg {
            color: #536471;
            font-size: 14px;
            text-align: center;
            padding: 20px 0;
        }
    </style>
</head>
<body>

<div class="timeline-container">
    <h1>kさんのタイムライン (Yahoo!経由)</h1>
    <ul id="tweet-list">タイムラインを読み込み中...</ul>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // 前のステップで作成するYahoo!経由のデータファイル
    const dataUrl = './data/k-san.json'; 

    fetch(dataUrl, { cache: "no-store" }) // キャッシュを防ぐ設定
        .then(response => {
            if (!response.ok) throw new Error('データが見つかりません');
            return response.json();
        })
        .then(tweets => {
            const listEl = document.getElementById('tweet-list');
            
            if (tweets.length === 0) {
                listEl.innerHTML = '<li class="error-msg">過去24時間以内に新しい投稿はありません。</li>';
                return;
            }

            let html = '';
            tweets.forEach(tweet => {
                html += `
                    <li class="tweet-item">
                        <div class="tweet-date">${tweet.date}</div>
                        <div class="tweet-text">${tweet.text}</div>
                    </li>
                `;
            });
            listEl.innerHTML = html;
        })
        .catch(err => {
            document.getElementById('tweet-list').innerHTML = '<li class="error-msg">現在タイムラインを取得できません。しばらく時間を置いてからお試しください。</li>';
        });
});
</script>

</body>
</html>
